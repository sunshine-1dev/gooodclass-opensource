services:
  gooodclass:
    build:
      context: .
      platforms:
        - linux/amd64
    container_name: gooodclass_server
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - minio
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_DSN=${MYSQL_DSN:-root:password@tcp(127.0.0.1:3306)/gooodclass?charset=utf8mb4&parseTime=true&loc=Local}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=gclass
      - MINIO_USE_SSL=false
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
    volumes:
      - ./data:/data

  minio:
    image: minio/minio:latest
    container_name: gooodclass_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
